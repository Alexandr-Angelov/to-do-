<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusFlow Ultra Max</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-container">
        <section class="timer-card" id="timer-card">
            <button id="fullscreen-btn">⛶ На весь экран</button>
            
            <div class="timer-display-group">
                <h1 id="status-text">ГОТОВ?</h1>
                <h2 id="timer-display">25:00</h2>
                <div class="progress-container"><div id="progress-bar"></div></div>
            </div>
            
            <div class="timer-settings">
                <div class="setting-item">
                    <label>РАБОТА (мин)</label>
                    <input type="number" id="work-time" value="25">
                </div>
                <div class="setting-item">
                    <label>ОТДЫХ (мин)</label>
                    <input type="number" id="break-time" value="5">
                </div>
                <div class="setting-item">
                    <label>ЦИКЛЫ</label>
                    <input type="number" id="cycles-count" value="3">
                </div>
            </div>

            <div class="controls">
                <button id="start-btn" class="main-btn">СТАРТ / ПРОДОЛЖИТЬ</button>
                <button id="pause-btn" class="secondary-btn">ПАУЗА</button>
                <button id="reset-btn" class="secondary-btn">СБРОС</button>
            </div>
        </section>

        <div class="side-panel">
            <section class="todo-card">
                <h2>ЗАДАЧИ: <span id="completion-pc">0%</span></h2>
                <div class="todo-input-wrapper">
                    <input type="text" id="todo-input" placeholder="Что нужно сделать?">
                    <button id="add-todo">ДОБАВИТЬ</button>
                </div>
                <div class="lists-wrapper">
                    <div class="list-title">В ПРОЦЕССЕ</div>
                    <ul id="todo-list"></ul>
                    <div class="list-title">ВЫПОЛНЕНО</div>
                    <ul id="done-list"></ul>
                </div>
                <section class="todo-card">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <h2>ЗАДАЧИ: <span id="completion-pc">0%</span></h2>
                        <button id="clear-all-tasks" class="clear-btn">ОЧИСТИТЬ ВСЁ</button>
                    </div>
                </section>
            </section>

            <section class="sound-card">
                <h3>АТМОСФЕРА</h3>
                <div class="sound-control"><span>🌧️ ДОЖДЬ</span><input type="range" id="rain-vol" min="0" max="1" step="0.01" value="0"></div>
                <div class="sound-control"><span>🔥 ОГОНЬ</span><input type="range" id="fire-vol" min="0" max="1" step="0.01" value="0"></div>
                <div class="sound-control"><span>🌳 ПАРК</span><input type="range" id="park-vol" min="0" max="1" step="0.01" value="0"></div>
            </section>
        </div>
    </div>

    <audio id="snd-work" src="work_end.mp3"></audio>
    <audio id="snd-break" src="break_end.mp3"></audio>
</body>
<script src="script.js"></script>
</html>
