<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Focus App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="main-container">
        <div class="card timer-card" id="timer-card">
            <h2 id="status-text">ГОТОВ?</h2>
            <div id="timer-display">25:00</div>
            
            <div class="controls">
                <button id="start-btn">СТАРТ</button>
                <button id="pause-btn">ПАУЗА</button>
                <button id="reset-btn">СБРОС</button>
            </div>

            <div class="settings">
                <div class="setting-item">
                    <label>Работа (мин):</label>
                    <input type="number" id="work-time" value="25">
                </div>
                <div class="setting-item">
                    <label>Отдых (мин):</label>
                    <input type="number" id="break-time" value="5">
                </div>
            </div>
            
            <button id="fullscreen-btn" class="secondary-btn">НА ВЕСЬ ЭКРАН</button>
        </div>

        <div class="card todo-card">
            <div class="todo-header">
                <h2>ЗАДАЧИ</h2>
                <span id="completion-pc">0%</span>
            </div>

            <div class="input-group">
                <input type="text" id="todo-input" placeholder="Что нужно сделать?">
                <button id="add-todo">+</button>
            </div>

            <h3>В процессе:</h3>
            <ul id="todo-list"></ul>

            <hr>

            <h3>Выполнено:</h3>
            <ul id="done-list"></ul>

            <button id="clear-all-tasks" class="danger-btn">ОЧИСТИТЬ ВСЁ</button>
        </div>

        <div class="card sounds-card">
            <h3>АТМОСФЕРА</h3>
            <div class="sound-item">
                <label>🌧️ Дождь</label>
                <input type="range" id="rain-vol" min="0" max="1" step="0.1" value="0">
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
